<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typography</title>
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
  </head>
  <body class="bg-dark">
    <div class="container p-1 my-2 text-light">
      <h1>Test</h1>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Nam, doloribus!
      </p>
      <p class="h3">h1.bootstrap</p>
      <p class="display-3">h1.bootstrap</p>
      <p class="display-6">h1.<mark>bootstrap</mark></p>
      <div class="border border-danger p-2">
        <p class="h5 text-start text-md-center text-lg-end">h1.bootstrap</p>
        <p class="h5 text-center">h1.bootstrap</p>
        <p class="h5 text-end">h1.bootstrap</p>
      </div>
      <p class="text-decoration-underline">Lorem ipsum dolor sit.</p>
      <p class="text-decoration-line-through">Lorem ipsum dolor sit.</p>
      <a href="" class="h5 text-decoration-none">Boo</a>
      <br />
      <i class="h1 bi bi-amd"></i>

      <div class="container mt-5 text-center">
        <span class="border border-2 border-success py-4 mx-2"> box </span>
        <span class="border border-2 border-success pt-4 mx-2"> box </span>
        <span class="border border-2 border-success px-4 mx-md-2 mx-lg-5">
          box
        </span>
        <span class="border border-2 border-success ps-4 mx-2"> box </span>
        <span class="border border-2 border-success pe-4 mx-2"> box </span>
      </div>

      <div
        class="position-relative border border-danger my-5"
        style="height: 500px"
      >
        <div
          class="position-absolute border border-primary p-3 bg-light text-dark top-0 start-0"
        >
          Box1
        </div>
        <div
          class="position-absolute border border-primary p-3 bg-light text-dark top-0 end-0"
        >
          Box2
        </div>
        <div
          class="position-absolute border border-primary p-3 bg-light text-dark bottom-0 start-0"
        >
          Box3
        </div>
        <div
          class="position-absolute border border-primary p-3 bg-light text-dark bottom-0 end-0"
        >
          Box4
        </div>
        <div
          class="position-absolute border border-primary p-3 bg-light text-dark top-50 start-50"
        >
          Box5
        </div>
        <div
          class="position-absolute border border-primary p-3 bg-light text-dark bottom-50 end-50"
        >
          Box6
        </div>
        <div
          class="position-absolute border border-primary p-3 bg-light text-dark bottom-50 start-50"
        >
          Box7
        </div>
        <div
          class="position-absolute border border-primary p-3 bg-light text-dark top-50 end-50"
        >
          Box8
        </div>
        <div
          class="position-absolute border border-primary p-3 bg-light text-dark top-0 start-50 translate-middle"
        >
          Box8
        </div>
      </div>

      <div class="container p-2 my-2 border border-2" style="height: 400px">
        <p class="bg-warning w-100 h-50">Hello</p>
        <div class="bg-primary w-100 h-50">
          <span>Hello</span>
        </div>
      </div>
    </div>
    <div class="container bg-danger p-3 my-2">
      <img
        src="https://i.pinimg.com/originals/38/3c/e6/383ce6d5b267fc3f8ebf2558ac3af625.jpg"
        alt="GOAT"
        class="img-fluid img-thumbnail rounded d-block mx-auto"
      />
    </div>
  </body>
</html>
