<!doctype html>
<html lang="en">
  <head>
    <title>FlexBox</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
  </head>

  <body class="bg-dark">
    <div
      class="container justify-content-start d-flex p-2 my-2 bg-secondary align-items-start"
      style="height: 200px"
    >
      <div class="pt-2 bg-info">Box1</div>
      <div class="pt-2 bg-danger">Box1</div>
      <div class="pt-2 bg-success">Box1</div>
    </div>
    <div
      class="container justify-content-center justify-content-lg-evenly align-items-center d-flex p-2 my-2 bg-secondary"
      style="height: 200px"
    >
      <div class="pt-2 bg-info">Box1</div>
      <div class="pt-2 bg-danger">Box1</div>
      <div class="pt-2 bg-success">Box1</div>
    </div>
    <div
      class="container justify-content-end align-items-end d-flex p-2 my-2 bg-secondary"
      style="height: 200px"
    >
      <div class="pt-2 bg-info">Box1</div>
      <div class="pt-2 bg-danger">Box1</div>
      <div class="pt-2 bg-success">Box1</div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
