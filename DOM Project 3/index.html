<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM | Project 3</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <header class="head">
        <h1 class="head-title">PIG GAME</h1>
      </header>
      <section class="player-section">
        <div class="player player-0 player-active">
          <h2 class="name" id="player-name-0">PLAYER 1</h2>
          <p class="score" id="score-0">42</p>
          <p class="winner-0 hidden">Winner!!</p>
          <div class="current">
            <p class="current-label">CURRENT SCORE</p>
            <p class="current-score" id="current-0">0</p>
          </div>
        </div>
        <div class="player player-1">
          <h2 class="name" id="player-name-1">PLAYER 2</h2>
          <p class="score" id="score-1">35</p>
          <p class="winner-1 hidden">Winner!!</p>
          <div class="current">
            <p class="current-label">CURRENT SCORE</p>
            <p class="current-score" id="current-1">0</p>
          </div>
        </div>
      </section>
      <img src="images/dice-5.png" alt="Playing dice" class="dice" />
      <div class="btn-group">
        <button class="btn btn-new">NEW GAME</button>
        <button class="btn btn-roll">ROLL DICE</button>
        <button class="btn btn-hold">HOLD</button>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
